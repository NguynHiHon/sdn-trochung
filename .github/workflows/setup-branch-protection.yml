name: Setup Branch Protection

# Workflow này tự động thiết lập quy tắc bảo vệ nhánh main:
# - Các thành viên khác phải tạo Pull Request và được NguynHiHon phê duyệt
# - NguynHiHon (admin) có thể push thẳng lên main

on:
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions
  push:
    branches:
      - main
    paths:
      - '.github/workflows/setup-branch-protection.yml'

jobs:
  setup-branch-protection:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Thiết lập bảo vệ nhánh main
        uses: actions/github-script@v7
        with:
          # Sử dụng PAT (Personal Access Token) có quyền admin
          # Tạo secret ADMIN_TOKEN trong Settings > Secrets and variables > Actions
          # Token cần có scope: repo (full control of private repositories)
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            try {
              await github.rest.repos.updateBranchProtection({
                owner,
                repo,
                branch,
                // Không yêu cầu status checks bắt buộc
                required_status_checks: null,
                // Không áp dụng cho admin (NguynHiHon có thể push thẳng)
                enforce_admins: false,
                // Yêu cầu Pull Request và ít nhất 1 lượt phê duyệt
                required_pull_request_reviews: {
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: true,
                  required_approving_review_count: 1,
                },
                // Không giới hạn ai được push (admin tự quản lý)
                restrictions: null,
                allow_force_pushes: false,
                allow_deletions: false,
              });

              console.log('✅ Bảo vệ nhánh main đã được thiết lập thành công!');
              console.log('   - Các thành viên phải tạo PR và được phê duyệt bởi code owner (@NguynHiHon)');
              console.log('   - Admin (NguynHiHon) có thể push thẳng lên main');
            } catch (error) {
              console.error('❌ Lỗi khi thiết lập bảo vệ nhánh:', error.message);
              console.error('Hãy đảm bảo secret ADMIN_TOKEN đã được cấu hình với quyền admin.');
              core.setFailed(error.message);
            }
